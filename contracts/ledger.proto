syntax = "proto3";

// Canonical ledger contract. Mirror of core/contracts/ledger.py
// (Phase 0, LEDGER-01..14, INV-15 determinism, CORE-07 replay reconstructor).
//
// Refs:
//  - manifest.md §0.0 (ledger authority), §1 (invariants)
//  - state/ledger/ (Python implementation)
//  - docs/total_recall_index.md §LEDGER-01..14
//  - build_plan.md Phase 0 (bootstrap core)
//
// The ledger is the immutable audit trail of all system decisions.
// Every event that reaches the ledger is canonically timestamped,
// indexed by (ts_ns, event_index), and never modified after ledgering.
//
// Replay determinism (INV-15) depends on:
//  1. Every event is pure-function-of (prior ledger state + input signal)
//  2. Field order is canonical across all ledger rows
//  3. Hash chains (LEDGER-05) detect tampering
//  4. Snapshots (LEDGER-08) allow fast forward-replay to any point in time

package dixvision.v42_2;

option java_package = "ai.dixvision.v42_2";

// Unified ledger event envelope. All events that reach the ledger wrap in this.
// One row per decision / execution / system change.
message LedgerEvent {
  // Unique ledger position (monotonic counter).
  int64 ledger_index = 1;  // 0, 1, 2, ...

  // Canonical timestamp when event was recorded (ns).
  // Assigned by time_authority (CORE-08) at ledger append time.
  int64 ledger_ts_ns = 2;

  // When the decision/signal occurred (may be earlier than ledger_ts_ns).
  int64 event_ts_ns = 3;

  // What kind of event is this?
  enum EventKind {
    KIND_UNSPECIFIED = 0;
    // Core events (from events.proto)
    SIGNAL_EVENT = 1;         // from intelligence_engine
    EXECUTION_EVENT = 2;      // from execution_engine
    SYSTEM_EVENT = 3;         // from system_engine
    HAZARD_EVENT = 4;         // from system_engine hazard sensors
    // Governance events (from governance.proto)
    MODE_TRANSITION = 5;      // SystemMode change
    POLICY_INSTALLED = 6;     // new Policy version
    LEARNING_UPDATE = 7;      // LearningUpdateProposal approved
    PATCH_DECISION = 8;       // PatchProposal final decision
    GOVERNANCE_DECISION = 9;  // audit trail of all governance
    // Ledger-specific events
    LEDGER_SNAPSHOT = 10;     // checkpoint for replay fast-forward
    LEDGER_INTEGRITY_CHECK = 11;  // hash-chain verification record
    LEDGER_MIRROR_SYNC = 12;  // redundant ledger replica sync marker
  }
  EventKind kind = 4;

  // Serialized event payload (one of the above proto types).
  // Using oneof would tie the ledger schema to every event type;
  // instead we use a generic bytes blob + kind discriminator.
  // Readers use kind to deserialize correctly.
  bytes event_payload = 5;

  // HARDEN-03: provenance — which engine produced the original event?
  // Copied from the original event's produced_by_engine field.
  string produced_by_engine = 6;

  // Previous ledger row's hash (for LEDGER-05 chain integrity).
  // SHA256(previous_row_proto_bytes). Empty string for ledger_index=0.
  string previous_hash = 7;

  // This row's hash (computed after it is written).
  // SHA256(this_row_proto_bytes_with_previous_hash_filled).
  // Used by all downstream readers for integrity verification.
  string row_hash = 8;

  // Schema version of the event payload.
  // Incremented when event types add fields; used for compatibility.
  string payload_schema_version = 9;  // e.g., "v42.2-Phase6"

  // Metadata (optional, audit-specific info).
  map<string, string> metadata = 10;  // e.g., {"user_id": "operator_1", "api_key_hash": "..."}
}

// Ledger snapshot (LEDGER-08). Periodic checkpoints for fast-forward replay.
// Written every N rows (configurable, default 1000) or on phase boundaries.
message LedgerSnapshot {
  // Which ledger_index this snapshot represents (the last event before snapshot).
  int64 snapshot_ledger_index = 1;

  // Timestamp of that event.
  int64 snapshot_ts_ns = 2;

  // Serialized state of all engines at this point (JSON or binary).
  // Format: {"intelligence_engine": {...}, "execution_engine": {...}, ...}
  bytes system_state_blob = 3;

  // Hash of the system_state_blob (for integrity).
  string state_blob_hash = 4;

  // Version of the snapshot schema (for compatibility).
  string snapshot_schema_version = 5;

  // HARDEN-03: provenance (governance_engine or core/reconstructor.py)
  string produced_by_engine = 6;
}

// Risk snapshot record (mirrors execution.proto RiskSnapshot but ledgered for replay).
// Appended to ledger after every execution gate decision.
message LedgerRiskSnapshot {
  int64 ledger_index = 1;  // reference to the corresponding LedgerEvent
  RiskSnapshot risk_snapshot = 2;  // embedded from execution.proto
  ExecutionGateDecision decision = 3;  // the decision that used this snapshot
}

// ILedger interface contract (from core/contracts/ledger.py).
// Describes the operations available on the ledger.
message LedgerInterface {
  // Can we append new events?
  bool supports_append = 1;

  // Can we read by ledger_index?
  bool supports_read_by_index = 2;

  // Can we scan by timestamp range?
  bool supports_read_by_time_range = 3;

  // Can we read snapshots?
  bool supports_snapshots = 4;

  // Total rows ledgered so far.
  int64 total_rows = 5;

  // Size (bytes) of the ledger on disk.
  int64 size_bytes = 6;

  // Last verified hash for integrity check (LEDGER-05).
  string last_verified_row_hash = 7;

  // HARDEN-03: provenance (always core/reconstructor.py or governance_engine)
  string produced_by_engine = 8;
}

// Ledger integrity report (LEDGER-06, LEDGER-07).
// Produced by tools/contract_diff.py on every ledger read.
message LedgerIntegrityReport {
  int64 report_ts_ns = 1;
  int64 report_ledger_index = 2;

  // Was the hash chain valid?
  bool hash_chain_valid = 3;

  // How many rows were verified?
  int64 rows_verified = 4;

  // If invalid, where did the chain break?
  int64 integrity_breach_index = 5;  // -1 if no breach

  // Breach details (if applicable).
  string breach_reason = 6;

  // Which rows had mismatches?
  repeated int64 mismatched_indices = 7;

  // HARDEN-03: provenance (tools/contract_diff.py)
  string produced_by_engine = 8;
}

// Event type definitions imported from other contracts.
// These are referenced in LedgerEvent.event_payload but defined elsewhere.
// Protoc will require imports; we list them here for clarity.

// Placeholder messages (defined in events.proto):
