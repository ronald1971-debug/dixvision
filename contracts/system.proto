syntax = "proto3";

// Canonical system contract. Mirror of core/contracts/system.py
// (Phase 4, CORE-01..31, SAFE-01..27, system-wide configuration and state).
//
// Refs:
//  - manifest.md §0.4 (ENGINE-04 Dyon system engine), §1 (invariants)
//  - system_engine/ (Python implementation)
//  - docs/total_recall_index.md §CORE-01..31, §SAFE-01..27
//  - build_plan.md Phase 4 (Dyon core)
//
// The system contract covers:
//  1. Global registry (plugins, engines, layers, feature flags)
//  2. System configuration (timeouts, budgets, limits)
//  3. System identity (CORE-13 charter hashes, CORE-30 engine charters)
//  4. Intent vectors (v3.1 system mission)
//  5. Coherence projections (v3-T1 Belief State, Pressure Vector)
//  6. Calibration records (v3.3 offline calibration reports)

package dixvision.v42_2;

option java_package = "ai.dixvision.v42_2";

// Global system configuration. Loaded from registry/ YAML files at boot.
message SystemConfiguration {
  // DIX version.
  string version = 1;  // e.g., "42.2"

  // Build hash (SHA256 of canonical tree + manifests).
  string build_hash = 2;  // CORE-13 system identity

  // Enabled engines (ENGINE-01..06).
  repeated string enabled_engines = 3;  // ["intelligence_engine", "execution_engine", ...]

  // Enabled plugins (from registry/plugins.yaml).
  repeated string enabled_plugins = 4;

  // Global feature flags.
  map<string, bool> feature_flags = 5;  // e.g., {"BELIEF_STATE_V3T1": true}

  // Hot-path time budget (ns).
  int64 hot_path_budget_ns = 6;  // default 1_000_000 ns = 1 ms

  // Ledger snapshot interval (rows).
  int32 ledger_snapshot_interval = 7;  // default 1000

  // Max concurrent orders per venue.
  int32 max_concurrent_orders = 8;

  // Kill switch configuration (CORE-09, immutable_core/kill_switch.py).
  KillSwitchConfig kill_switch = 9;

  // Time authority configuration (CORE-08).
  TimeAuthorityConfig time_authority = 10;

  // Hazard sensor configuration (HAZ-01..12).
  HazardSensorConfig hazard_sensors = 11;

  // HARDEN-03: provenance (governance_engine at boot)
  string produced_by_engine = 12;
}

// Kill switch configuration (CORE-09, SAFE-22).
// The kill switch is the nuclear option: stops all orders, enters SAFE_LOCKED.
message KillSwitchConfig {
  // Is the kill switch enabled?
  bool enabled = 1;

  // Conditions that trigger the kill switch.
  repeated KillCondition conditions = 2;

  // Who can activate the kill switch? (AuthorityRole enum)
  repeated int32 authorized_roles = 3;  // e.g., [5] = SAFETY_GUARDIAN only

  // Grace period (ns) before kill switch takes effect.
  // Allows for operator acknowledgement.
  int64 grace_period_ns = 4;

  message KillCondition {
    enum ConditionKind {
      KIND_UNSPECIFIED = 0;
      HAZARD_CRITICAL = 1;       // any CRITICAL hazard
      DRAWDOWN_THRESHOLD = 2;    // max_daily_drawdown_pct exceeded
      LATENCY_SPIKE = 3;         // latency > threshold for N consecutive ticks
      MEMORY_OVERFLOW = 4;       // memory > threshold
      EXCHANGE_DISCONNECT = 5;   // all data sources offline
    }
    ConditionKind kind = 1;
    string parameter = 2;  // e.g., "drawdown_threshold_pct=5.0"
  }
}

// Time authority configuration (CORE-08).
// The time authority is the single source of truth for system clocks.
message TimeAuthorityConfig {
  // Primary time source ("exchange" or "system").
  string primary_source = 1;

  // Secondary fallback source.
  string fallback_source = 2;

  // Max allowed clock drift (ns) before alarm.
  int64 max_drift_ns = 3;  // default 1_000_000 ns = 1 ms

  // NTP server (if using external sync).
  string ntp_server = 4;
}

// Hazard sensor configuration (HAZ-01..12).
message HazardSensorConfig {
  // Enabled hazard sensors.
  repeated HazardSensorConfig.Sensor sensors = 1;

  // Global hazard dampening (0.0..1.0, where 0 = no hazard escalation).
  // Used to suppress false alarms during normal volatility.
  double dampening_factor = 2;

  message Sensor {
    string name = 1;  // e.g., "HAZ-01-WebSocketTimeout"
    bool enabled = 2;
    map<string, string> parameters = 3;  // sensor-specific config
  }
}

// System intent vector (v3.1, CORE-27, GOV-CP-07 setter).
// Read-only projection of the operator's stated mission.
// The system never mutates intent; only the operator (via GOV-CP-07) does.
message IntentVector {
  int64 ts_ns = 1;  // when intent was set

  // Primary objective (e.g., "maximize_sharpe", "target_return", "minimize_drawdown").
  string objective = 2;

  // Time horizon (ns). How far forward are we planning?
  int64 horizon_ns = 3;  // e.g., 86400e9 = 1 day

  // Risk mode ("conservative", "moderate", "aggressive").
  string risk_mode = 4;

  // Active regime(s) this intent targets (e.g., ["trend_following", "mean_reversion"]).
  repeated string active_regimes = 5;

  // Whether to hold overnight (true = strategies can stay in positions overnight).
  bool hold_overnight = 6;

  // Operator-written notes (rationale for this intent).
  string rationale = 7;

  // HARDEN-03: provenance (governance_engine, set by operator via GOV-CP-07)
  string produced_by_engine = 8;
}

// Belief State snapshot (v3-T1, core/coherence/belief_state.py).
// Frozen read-only projection of market beliefs at a point in time.
// Used by meta-controller for regime-aware routing.
message BeliefState {
  int64 ts_ns = 1;  // when this belief was current

  // Detected market regime ("trending_up", "trending_down", "mean_reverting", etc.).
  string regime = 2;

  // Regime confidence (0.0..1.0).
  double regime_confidence = 3;

  // Realized volatility (annualized).
  double volatility = 4;

  // Liquidity score (0.0..1.0, where 1 = excellent liquidity).
  double liquidity_score = 5;

  // Crowdedness (0.0..1.0, where 1 = highly crowded, alpha decay likely).
  double crowdedness = 6;

  // Active hypotheses (tentative beliefs awaiting confirmation).
  repeated string active_hypotheses = 7;

  // HARDEN-03: provenance (core/coherence, via L3 Protocol read)
  string produced_by_engine = 8;
}

// Performance Pressure vector (v3-T1, core/coherence/performance_pressure.py).
// Derived from realised outcomes; guides meta-controller throttling.
message PressureVector {
  int64 ts_ns = 1;

  // Realised P&L relative to target (negative = underperforming).
  double performance_gap = 2;

  // Risk utilization (0.0..1.0, where 1 = at limit).
  double risk_utilization = 3;

  // Strategy drift (how much has recent performance diverged from backtest?).
  double drift = 4;

  // Latency pressure (orders filling slower than expected).
  double latency_pressure = 5;

  // Uncertainty (entropy of signal confidence scores).
  double uncertainty = 6;  // v3.2: entropy-aware (INV-50)

  // Throttle recommendation (0.0..1.0, where 0 = hold, 1 = full speed).
  double throttle_recommendation = 7;

  // HARDEN-03: provenance (core/coherence)
  string produced_by_engine = 8;
}

// Calibration report (v3.3, learning_engine/calibration/coherence_calibrator.py).
// Offline analysis of whether beliefs matched reality.
// Used by governance to gate confidence in live coherence projections.
message CalibrationReport {
  int64 report_ts_ns = 1;
  string report_id = 2;

  // Time window over which calibration was computed.
  int64 window_start_ns = 3;
  int64 window_end_ns = 4;

  // How well did Belief State regimes predict actual outcomes?
  double regime_prediction_accuracy = 5;  // (0.0..1.0)

  // How well did Pressure Vector pressure track actual constraint tightness?
  double pressure_fidelity = 6;  // (0.0..1.0)

  // Confidence in these metrics (0.0..1.0).
  double confidence_in_calibration = 7;

  // If calibration is low, what should we do?
  enum RecalibrationType {
    TYPE_UNSPECIFIED = 0;
    NO_ACTION = 1;              // calibration looks good
    INCREASE_UNCERTAINTY = 2;   // widen confidence bands
    REDUCE_POSITION_SIZING = 3; // be more conservative
    ENTER_SAFE_MODE = 4;        // too much divergence, require HITL gate
  }
  RecalibrationType recommended_action = 8;

  // HARDEN-03: provenance (learning_engine)
  string produced_by_engine = 9;
}

// Registry envelope (high-level wrapper around all registry configs).
// Loaded from registry/ YAML directory at boot.
message RegistryEnvelope {
  int64 loaded_ts_ns = 1;  // when registry was last loaded from disk

  // Schema version.
  string registry_version = 2;  // e.g., "REG-01..14"

  // All active plugins.
  repeated PluginRecord plugins = 3;

  // All active engines.
  repeated EngineRecord engines = 4;

  // All active agents (v3-P10).
  repeated AgentRecord agents = 5;

  // Trader archetypes (v3-P10).
  repeated TraderArchetype trader_archetypes = 6;

  // Risk limits.
  map<string, double> risk_limits = 7;  // e.g., {"max_daily_drawdown_pct": 5.0}

  // Feature flags.
  map<string, bool> feature_flags = 8;

  // HARDEN-03: provenance (governance_engine at boot)
  string produced_by_engine = 9;

  message PluginRecord {
    string plugin_name = 1;
    string plugin_class = 2;  // fully-qualified Python class
    map<string, string> config = 3;  // plugin-specific config
    bool enabled = 4;
  }

  message EngineRecord {
    string engine_name = 1;  // "intelligence_engine", "execution_engine", etc.
    bool enabled = 2;
    map<string, string> config = 3;
  }

  message AgentRecord {
    string agent_name = 1;    // "scalper", "swing_trader", etc.
    string agent_class = 2;   // fully-qualified Python class
    bool enabled = 3;
    map<string, string> config = 4;
  }

  message TraderArchetype {
    string archetype_name = 1;  // e.g., "momentum_trader_v1"
    map<string, double> dimensions = 2;  // {"aggressiveness": 0.8, "volatility_sensitivity": 0.6}
    string description = 3;
    enum ArchetypeState {
      STATE_UNSPECIFIED = 0;
      ACTIVE = 1;        // currently trading
      SHADOW = 2;        // live but non-executing
      DECAY = 3;         // performance degrading
      RETIRED = 4;       // no longer used
    }
    ArchetypeState state = 4;  // v3.2: archetype lifecycle (INV-51)
    double decay_rate = 5;     // v3.2: how fast alpha decays (%/week)
    double performance_score = 6;  // v3.2: recent PnL attribution
  }
}
