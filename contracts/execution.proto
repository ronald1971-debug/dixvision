syntax = "proto3";

// Canonical execution contract. Mirror of core/contracts/execution.py
// (Phase 2, EXEC-01..14, INV-17 T1 purity, INV-15 determinism).
//
// Refs:
//  - manifest.md §0.2 (ENGINE-02 Indira→Execution path), §2 (INV-17 T1 purity)
//  - execution_engine/hot_path/fast_execute.py (branch order canonical)
//  - docs/total_recall_index.md §EXEC-01..14
//  - build_plan.md Phase 2 (execution core)
//
// The execution gate is the most determinism-critical path in the system.
// Every field must be indexable and carry full provenance.
// No floating-point intermediate state; only start/end snaps.

package dixvision.v42_2;

option java_package = "ai.dixvision.v42_2";

enum ExecutionRejectReason {
  REASON_UNSPECIFIED = 0;
  REJECTED_LIMIT = 1;           // qty_above_cap or halted reason
  REJECTED_RISK_STALE = 2;      // ts_ns staleness breach
  REJECTED_NO_MARK = 3;         // mark_price <= 0.0
  REJECTED_LOW_CONFIDENCE = 4;  // confidence < floor
  REJECTED_HOLD = 5;            // side == HOLD
}

enum ExecutionGateStatus {
  GATE_STATUS_UNSPECIFIED = 0;
  APPROVED = 1;                 // passed all gates, execution safe
  REJECTED = 2;                 // gated out at one branch
}

// Risk snapshot at the moment a decision was made.
// Immutable once frozen for replay determinism (INV-15).
// T1 (hot-path) contract — all fields MUST be computable in <1ms.
message RiskSnapshot {
  // Timestamp (ns) when risk cache was read. INV-09 clock source authority.
  int64 ts_ns = 1;

  // Market mark price from the tick that triggered decision.
  // REJECTED_NO_MARK if <= 0.0 (market closed or invalid).
  double mark_price = 2;

  // Position quantity limit (caps per venue + account + instrument).
  // REJECTED_LIMIT if proposed qty > cap.
  double qty_cap = 3;

  // Current cached position (contracts / shares / coins held).
  // For replay determinism, must be read at decision time, not recomputed.
  double current_position = 4;

  // Remaining intraday risk budget (in base currency).
  // Depletes as trades fill; used to gate oversized fills.
  double remaining_budget = 5;

  // System halted flag. Checked first in the decision ladder.
  // If true, all orders are REJECTED_LIMIT (reason="halted").
  bool halted = 6;

  // Version identifier for this RiskSnapshot schema.
  // Incremented on field additions; used in replay validation.
  // Stored in ledger events so readers know which version they're reading.
  string risk_version = 7;

  // HARDEN-03: engine that produced this snapshot (provenance triad).
  string produced_by_engine = 8;
}

// Execution gate decision. Immutable contract for the critical path.
message ExecutionGateDecision {
  // Incoming signal metadata
  int64 ts_ns = 1;              // signal timestamp (ns)
  string symbol = 2;            // trading instrument
  int32 side = 3;               // Side enum: BUY=1, SELL=2, HOLD=3
  double confidence = 4;        // signal confidence (0.0..1.0)
  string venue = 5;             // execution venue (e.g., "binance")
  double proposed_qty = 6;      // qty to execute if approved

  // Snapshot state at decision time
  RiskSnapshot risk_snapshot = 7;  // frozen state for determinism

  // Decision outcome
  ExecutionGateStatus status = 8;    // APPROVED | REJECTED
  ExecutionRejectReason reason = 9;  // detailed reject reason (if rejected)

  // Execution metadata
  string trace_id = 10;         // deterministic hash(symbol, ts_ns, plugin_chain)
  map<string, string> context = 11;  // agent_context keys (v3.2 B15 schema)

  // HARDEN-03: Provenance triad
  string produced_by_engine = 12;    // ENGINE-02 (execution_engine)

  // Replay invariants
  // All fields above must produce identical outputs under identical inputs.
  // This message MUST be a pure function of (signal, risk_snapshot, config).
  // If you are tempted to add a clock or random field, you have broken INV-15.
}

// Execution adapter interface contract (IExecutionAdapter in Python).
// Each venue integration (Binance, OANDA, IBKR, etc.) implements this.
message ExecutionAdapterContract {
  // Venue identifier (lowercase, e.g., "binance", "oanda").
  string venue_id = 1;

  // Human-readable name.
  string display_name = 2;

  // Supported asset classes (SPOT, FUTURES, FOREX, CFD, etc.).
  repeated string supported_asset_classes = 3;

  // Supported order types (MARKET, LIMIT, STOP_LOSS, TAKE_PROFIT, etc.).
  repeated string supported_order_types = 4;

  // Max orders per second this adapter can submit.
  double rate_limit_orders_per_sec = 5;

  // Whether the adapter can report real-time fills (live execution path).
  bool supports_live_fills = 6;

  // Whether the adapter supports paper-trading mode.
  bool supports_paper_trading = 7;

  // Minimum order size (base currency) before venue will accept.
  double min_order_value = 8;

  // Max concurrent orders the venue will accept per account.
  int32 max_concurrent_orders = 9;

  // HARDEN-03: This contract is immutable; served from registry.
  // Used to validate domain isolation (SAFE-13, INV-20).
  string produced_by_engine = 10;
}

// Order fill record — immutable once ledgered.
// Produced by adapters, consumed by reconciliation and PnL attribution.
message FillRecord {
  int64 ts_filled_ns = 1;       // execution timestamp on venue
  string symbol = 2;
  int32 side = 3;               // BUY or SELL
  double qty_filled = 4;
  double price = 5;             // actual fill price
  double fee = 6;               // transaction cost (venue + slippage)
  string venue = 7;
  string order_id = 8;          // venue order ID
  map<string, string> meta = 9; // venue-specific data

  // HARDEN-03: provenance
  string produced_by_engine = 10;  // adapter that filled this
}

// Summary of all fills for a trade lifecycle (NEW → PENDING → PARTIAL → FILLED → CLOSED).
message TradeLifecycleSummary {
  string trace_id = 1;          // deterministic hash(symbol, ts_ns, plugin_chain)
  int64 trade_start_ts_ns = 2;  // when first order was submitted
  int64 trade_end_ts_ns = 3;    // when trade closed or cancelled

  double total_qty_requested = 4;   // original qty from signal
  double total_qty_filled = 5;      // sum of all fills
  double qty_cancelled = 6;         // qty that expired / cancelled

  double total_fees = 7;            // sum of all fill fees
  double realized_pnl = 8;          // (sell_value - buy_value - fees) in base currency

  repeated FillRecord fills = 9;    // all fills in order
  map<string, string> rejection_log = 10;  // if rejected at any stage

  // HARDEN-03: provenance (ENGINE-02)
  string produced_by_engine = 11;
}
