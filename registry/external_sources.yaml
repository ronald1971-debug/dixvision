# BUILD-DIRECTIVE §24 — Approved external data sources.
# Each source starts at trust=UNTRUSTED. Only the operator can promote
# via POST /api/operator/external_source (source_trust_promotions.py).
#
# Fields:
#   platform:    Source platform name
#   trust:       UNTRUSTED | LOW | MEDIUM | HIGH | VERIFIED
#   methods:     Allowed fetch methods (B-FETCH enforced)
#   approved_by: Operator ID who approved (empty if UNTRUSTED)
#   approved_ts: Epoch ns when approved (0 if UNTRUSTED)
#   notes:       Free-form

sources:
