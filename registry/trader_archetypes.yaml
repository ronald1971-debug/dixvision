# Trader Archetype registry — Indira Intelligence Foundation.
#
# Structure: 30 real seed traders expanded into 300 archetypes via
# dimensional parameterization (timeframe × risk × execution × regime).
#
# Seed traders (validated by real-world performance):
#   Macro: Soros, Druckenmiller, PTJ, Dalio
#   Discretionary: Livermore, Raschke
#   Quant: Simons, Shaw, Citadel MM, Jump, Avellaneda, Lopez de Prado, Natenberg
#   Trend: Dennis, Seykota, Minervini, O'Neil
#   Value: Buffett, Lynch
#   Event: Paulson, Burry, Taleb
#   Flow: Dalton, Steidlmayer
#   Crypto: Hayes, Counter-FTX, DeFi Sniper, Whale Tracker
#   Meta: Swensen, Thorp
#
# Dimensions for expansion:
#   timeframe: SCALP | INTRADAY | SWING | POSITION | MACRO
#   risk_attitude: CONSERVATIVE | MODERATE | AGGRESSIVE
#   conviction_style: REACTIVE | PREDICTIVE | CONTRARIAN | SYSTEMATIC
#   regime_bias: TRENDING | RANGING | VOLATILE | STABLE | CRISIS
#
# Governance rules (INV-51):
#   * State transitions (PROPOSED → ACTIVE → DECAYING → DEMOTED) are
#     offline-only, flow through Governance patch pipeline.
#   * Never mutate silently — all updates → ledger events.
#   * Engines read this file as read-only on the hot path.
#
# Schema (per entry under archetypes:):
#   archetype_id:                # TA-<CATEGORY>-<index>
#     name: str                  # human-readable label
#     state: PROPOSED|ACTIVE|DECAYING|DEMOTED
#     decay_rate: float          # in [0, 1]; per-window performance decay
#     performance_score: float   # in [-1, 1]; live-ledger weighted
#     seed_trader: str           # source seed trader reference
#     group: str                 # category group
#     philosophy: str            # core trading philosophy
#     dimensions:
#       belief_system: {tag: strength}      # tag→[0,1]
#       risk_attitude: CONSERVATIVE|MODERATE|AGGRESSIVE
#       time_horizon: SCALP|INTRADAY|SWING|POSITION|MACRO
#       conviction_style: REACTIVE|PREDICTIVE|CONTRARIAN|SYSTEMATIC
#       regime_performance: {regime: score}  # regime→[-1,1]

